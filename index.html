<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M I N D  S H E L F</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --mouse-x: 50%;
            --mouse-y: 0%;
            --bg-dark: #030712;
            --panel-bg: rgba(11, 17, 32, 0.65);
            --border-glow: rgba(16, 185, 129, 0.2);
            --neon-accent: #10b981;
            --neon-teal: #34d399;
            --muted-text: #6b7280;
        }

        body {
            background-color: var(--bg-dark);
            /* Refined backdrop tracking matrix */
            background-image: 
                radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(16, 185, 129, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 0%, #061c12 0%, var(--bg-dark) 75%);
            background-attachment: fixed;
            letter-spacing: -0.01em;
        }

        /* Premium Glass Panel UI Architecture */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(16, 185, 129, 0.12);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
            transition: border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .glass-panel:hover {
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.06), 0 20px 40px -10px rgba(0, 0, 0, 0.7);
            transform: translateY(-3px);
        }

        /* Clean Terminal Forms */
        .input-element {
            background: rgba(3, 7, 18, 0.6);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 10px;
            color: #f3f4f6;
            transition: all 0.3s ease;
        }

        .input-element:focus {
            outline: none;
            border-color: var(--neon-accent);
            background: rgba(3, 7, 18, 0.9);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.25);
        }

        select option {
            background-color: var(--bg-dark);
            color: #f3f4f6;
        }

        /* Custom Scrollbar Engine */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(16, 185, 129, 0.15);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(16, 185, 129, 0.4);
        }

        /* --- MIND SHELF Cinematic Text Intro --- */
        .intro-svg-text {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 21px;
            font-weight: 900;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            stroke: var(--neon-accent);
            stroke-width: 0.5px;
            fill: url(#header-gradient);
            fill-opacity: 0;
            stroke-dasharray: 400;
            stroke-dashoffset: 400;
            animation: drawOutline 2s cubic-bezier(0.16, 1, 0.3, 1) forwards, fillText 0.8s ease-in forwards 1.4s;
        }

        @keyframes drawOutline {
            0% { stroke-dashoffset: 400; stroke-width: 0.5px; }
            100% { stroke-dashoffset: 0; stroke-width: 0px; }
        }

        @keyframes fillText {
            0% { fill-opacity: 0; }
            100% { fill-opacity: 1; }
        }

        /* --- Spotify Pulse Equalizer --- */
        .spotify-bar {
            width: 2.5px;
            height: 14px;
            background-color: var(--neon-accent);
            animation: bounceEqualizer 0.8s ease-in-out infinite alternate;
            border-radius: 2px;
            margin: 0 1px;
        }
        .spotify-bar:nth-child(1) { animation-delay: 0.1s; background-color: #10b981; }
        .spotify-bar:nth-child(2) { animation-delay: 0.4s; background-color: #34d399; height: 18px; }
        .spotify-bar:nth-child(3) { animation-delay: 0.2s; background-color: #059669; }
        .spotify-bar:nth-child(4) { animation-delay: 0.5s; background-color: #a7f3d0; }

        @keyframes bounceEqualizer {
            0% { transform: scaleY(0.4); }
            100% { transform: scaleY(1.2); }
        }

        /* --- Neo-Toggle Interactive Matrix --- */
        .neo-toggle-container {
            --toggle-width: 64px;
            --toggle-height: 30px;
            --toggle-bg: #030712;
            --toggle-off-color: #ef4444; 
            --toggle-on-color: #10b981;
            --toggle-transition: 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            display: inline-flex;
        }
        .neo-toggle-input { position: absolute; opacity: 0; width: 0; height: 0; }
        .neo-toggle { position: relative; width: var(--toggle-width); height: var(--toggle-height); display: block; cursor: pointer; }
        .neo-track {
            position: absolute;
            inset: 0;
            border-radius: calc(var(--toggle-height) / 2);
            background: var(--toggle-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: border-color var(--toggle-transition);
        }
        .neo-grid-layer {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, rgba(239, 68, 68, 0.15) 1px, transparent 1px);
            background-size: 5px 100%;
            opacity: 0.3;
            transition: opacity var(--toggle-transition);
        }
        .neo-toggle-input:checked + .neo-toggle .neo-grid-layer {
            background-image: linear-gradient(to right, rgba(16, 185, 129, 0.15) 1px, transparent 1px);
        }
        .neo-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            transition: transform var(--toggle-transition);
            z-index: 1;
        }
        .neo-thumb-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: var(--toggle-off-color);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
            transition: background var(--toggle-transition), box-shadow var(--toggle-transition);
        }
        .neo-thumb-core {
            position: absolute;
            inset: 3.5px;
            border-radius: 50%;
            background: #0b1120;
        }
        .neo-thumb-wave {
            position: absolute;
            inset: 5px;
            border-radius: 50%;
            background: var(--toggle-off-color);
            transition: background var(--toggle-transition);
        }
        .neo-spectrum-analyzer {
            position: absolute;
            bottom: 4px;
            right: 8px;
            height: 6px;
            display: flex;
            align-items: flex-end;
            gap: 1px;
            opacity: 0;
            transition: opacity var(--toggle-transition);
        }
        .neo-spectrum-bar { width: 1.5px; height: 2px; background-color: var(--toggle-on-color); }
        .neo-toggle-input:checked + .neo-toggle .neo-thumb { transform: translateX(34px); }
        .neo-toggle-input:checked + .neo-toggle .neo-thumb-ring { background-color: var(--toggle-on-color); box-shadow: 0 0 12px rgba(16, 185, 129, 0.5); }
        .neo-toggle-input:checked + .neo-toggle .neo-thumb-wave { background: var(--toggle-on-color); }
        .neo-toggle-input:checked + .neo-toggle .neo-spectrum-analyzer { opacity: 0.8; }
        .neo-toggle-input:checked + .neo-toggle .neo-spectrum-bar:nth-child(1) { animation: neo-spectrum 0.6s infinite; }
        .neo-toggle-input:checked + .neo-toggle .neo-spectrum-bar:nth-child(2) { animation: neo-spectrum 0.4s 0.1s infinite; }
        .neo-toggle-input:checked + .neo-toggle .neo-spectrum-bar:nth-child(3) { animation: neo-spectrum 0.5s 0.2s infinite; }
        @keyframes neo-spectrum { 0%, 100% { height: 2px; } 50% { height: 6px; } }

        /* --- Tactical Erasure Core (Bin Button) --- */
        .bin-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: rgba(239, 68, 68, 0.05);
            cursor: pointer;
            border: 1px solid rgba(239, 68, 68, 0.2);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        .bin-bottom { width: 11px; z-index: 2; fill: #ef4444; transition: fill 0.3s; }
        .bin-top { width: 12px; transform-origin: right center; transition: transform 0.3s, fill 0.3s; z-index: 2; fill: #ef4444; }
        .bin-button:hover .bin-top { transform: rotate(35deg); fill: #ffffff; }
        .bin-button:hover .bin-bottom { fill: #ffffff; }
        .bin-button:hover { background-color: #dc2626; border-color: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        .bin-button:active { transform: scale(0.9); }
        .garbage { position: absolute; width: 10px; z-index: 1; opacity: 0; transition: all 0.3s; fill: #ffffff; }
        .bin-button:hover .garbage { animation: throw 0.4s linear; }
        @keyframes throw {
            from { transform: translate(-100%, -100%); opacity: 0; }
            to { transform: translate(0%, 0%); opacity: 1; }
        }
    </style>
</head>
<body class="text-gray-300 min-h-screen font-sans pb-16">

    <header class="w-full max-w-7xl mx-auto px-6 pt-8 pb-3 flex flex-col md:flex-row justify-between items-center border-b border-gray-800/40 mb-10 gap-4">
        <div class="text-center sm:text-left">
            <div class="h-10 flex items-center select-none justify-center sm:justify-start">
                <svg viewBox="0 0 320 30" class="w-[260px] sm:w-[320px] h-full overflow-visible">
                    <defs>
                        <linearGradient id="header-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#10b981" />
                            <stop offset="100%" stop-color="#6ee7b7" />
                        </linearGradient>
                    </defs>
                    <text x="0" y="22" class="intro-svg-text">MINDSHELF</text>
                </svg>
            </div>
            <p class="text-[10px] text-emerald-500/50 font-mono tracking-[0.4em] uppercase mt-1">L I B R A R Y</p>
        </div>

        <div class="flex items-center space-x-3">
            <div class="flex items-center bg-gray-900/40 border border-gray-800/50 rounded-xl pl-3 pr-4 py-1.5 backdrop-blur-md">
                <i class="fa-brands fa-spotify text-emerald-500 text-base mr-2.5 animate-spin [animation-duration:16s]"></i>
                <div class="flex flex-col max-w-[120px] mr-4 font-mono">
                    <span class="text-[11px] text-gray-200 font-bold truncate tracking-wide">Weightless</span>
                    <span class="text-[9px] text-gray-500 truncate mt-0.5">Arijit Singh</span>
                </div>
                <div class="flex items-center h-4">
                    <div class="spotify-bar"></div>
                    <div class="spotify-bar"></div>
                    <div class="spotify-bar"></div>
                    <div class="spotify-bar"></div>
                </div>
            </div>

            <div class="flex items-center space-x-2 text-[10px] font-mono bg-emerald-950/20 px-3.5 py-2.5 rounded-xl border border-emerald-500/20 text-emerald-400 h-[38px] tracking-widest font-bold">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse inline-block mr-1"></span> SYNCED
            </div>
        </div>
    </header>

    <main class="w-full max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <section class="glass-panel rounded-2xl p-6 flex flex-col h-[560px]">
            <div class="flex items-center justify-between mb-5">
                <div class="flex items-center space-x-3">
                    <div class="p-2 bg-emerald-950/30 border border-emerald-500/20 rounded-lg text-emerald-400">
                        <i class="fa-solid fa-film text-base"></i>
                    </div>
                    <h2 class="text-sm font-bold tracking-wider uppercase text-gray-100">Media Deck</h2>
                </div>
                <span id="movie-count" class="text-[10px] font-mono bg-gray-950 px-2.5 py-0.5 rounded border border-gray-800 text-emerald-400">0</span>
            </div>

            <div class="space-y-2.5 mb-5 bg-gray-950/40 p-3 rounded-xl border border-gray-800/40">
                <input type="text" id="movie-title" placeholder="Title..." class="w-full input-element px-3 py-2 text-sm">
                
                <div class="grid grid-cols-2 gap-2">
                    <select id="movie-genre" class="input-element px-2 py-2 text-sm cursor-pointer">
                        <option value="" disabled selected>Genre...</option>
                        <option value="Action">Action</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Thriller">Thriller</option>
                        <option value="Drama">Drama</option>
                        <option value="Romance">Romance</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Horror">Horror</option>
                        <option value="Wholesome">Wholesome</option>
                    </select>

                    <select id="movie-type" class="input-element px-2 py-2 text-sm cursor-pointer">
                        <option value="Movie">Movie</option>
                        <option value="Web Series">Web Series</option>
                    </select>
                </div>

                <div class="flex items-center justify-between pt-1">
                    <div class="flex items-center space-x-1">
                        <span class="text-[10px] text-gray-500 mr-1 font-mono uppercase tracking-wider">Rating:</span>
                        <div id="star-rating-selector" class="text-gray-700 flex space-x-1 text-xs">
                            <i class="fa-solid fa-star cursor-pointer hover:text-emerald-400 transition-colors" onclick="setRating(1)" data-index="1"></i>
                            <i class="fa-solid fa-star cursor-pointer hover:text-emerald-400 transition-colors" onclick="setRating(2)" data-index="2"></i>
                            <i class="fa-solid fa-star cursor-pointer hover:text-emerald-400 transition-colors" onclick="setRating(3)" data-index="3"></i>
                            <i class="fa-solid fa-star cursor-pointer hover:text-emerald-400 transition-colors" onclick="setRating(4)" data-index="4"></i>
                            <i class="fa-solid fa-star cursor-pointer hover:text-emerald-400 transition-colors" onclick="setRating(5)" data-index="5"></i>
                        </div>
                    </div>

                    <button onclick="addMovie()" class="bg-emerald-600 hover:bg-emerald-500 text-gray-950 text-[11px] uppercase tracking-wider font-bold px-4 py-2 rounded-lg transition-all active:scale-95">
                        Incorporate
                    </button>
                </div>
            </div>

            <div id="movie-list" class="flex-1 overflow-y-auto space-y-2.5 pr-1"></div>
        </section>

        <section class="glass-panel rounded-2xl p-6 flex flex-col h-[560px]">
            <div class="flex items-center justify-between mb-5">
                <div class="flex items-center space-x-3">
                    <div class="p-2 bg-emerald-950/30 border border-emerald-500/20 rounded-lg text-emerald-400">
                        <i class="fa-solid fa-graduation-cap text-base"></i>
                    </div>
                    <h2 class="text-sm font-bold tracking-wider uppercase text-gray-100">Study Stack</h2>
                </div>
                <span id="study-count" class="text-[10px] font-mono bg-gray-950 px-2.5 py-0.5 rounded border border-gray-800 text-emerald-400">0</span>
            </div>

            <div class="space-y-2.5 mb-5">
                <input type="text" id="study-topic" placeholder="Topic index..." class="w-full input-element px-3.5 py-2 text-sm">
                <div class="flex space-x-2">
                    <input type="text" id="study-link" placeholder="Resource link URL (Optional)" class="w-2/3 input-element px-3 py-2 text-sm">
                    <button onclick="addStudyMaterial()" class="w-1/3 bg-emerald-600 hover:bg-emerald-500 text-gray-950 text-[11px] uppercase tracking-wider font-bold rounded-lg transition-all active:scale-95">
                        Log Index
                    </button>
                </div>
            </div>

            <div id="study-list" class="flex-1 overflow-y-auto space-y-2.5 pr-1"></div>
        </section>

        <section class="glass-panel rounded-2xl p-6 flex flex-col h-[560px]">
            <div class="flex items-center justify-between mb-5">
                <div class="flex items-center space-x-3">
                    <div class="p-2 bg-emerald-950/30 border border-emerald-500/20 rounded-lg text-emerald-400">
                        <i class="fa-solid fa-bolt text-base"></i>
                    </div>
                    <h2 class="text-sm font-bold tracking-wider uppercase text-gray-100">Neural Echoes</h2>
                </div>
            </div>

            <div class="space-y-2.5 mb-5">
                <textarea id="quote-text" rows="2" placeholder="Record inspiring ideation..." class="w-full input-element px-3.5 py-2 text-sm resize-none"></textarea>
                <div class="flex space-x-2">
                    <input type="text" id="quote-author" placeholder="Attribution" class="w-2/3 input-element px-3 py-2 text-sm">
                    <button onclick="addQuote()" class="w-1/3 bg-emerald-600 hover:bg-emerald-500 text-gray-950 text-[11px] uppercase tracking-wider font-bold rounded-lg transition-all active:scale-95">
                        Transmit
                    </button>
                </div>
            </div>

            <div id="quote-list" class="flex-1 overflow-y-auto space-y-3 pr-1"></div>
        </section>

     </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQTS1ll4900i_1rVmeVHMSSKR-JMMD3pU",
            authDomain: "zentro-9198c.firebaseapp.com",
            projectId: "zentro-9198c",
            storageBucket: "zentro-9198c.firebasestorage.app",
            messagingSenderId: "870979959946",
            appId: "1:870979959946:web:f7456f422be3aa09a78173"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentSelectedRating = 0;

        window.setRating = (rating) => {
            currentSelectedRating = rating;
            const stars = document.querySelectorAll('#star-rating-selector i');
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.classList.remove('text-gray-700');
                    star.classList.add('text-emerald-400');
                } else {
                    star.classList.add('text-gray-700');
                    star.classList.remove('text-emerald-400');
                }
            });
        };

        function buildStarRatingDOM(ratingCount) {
            let ratingStarsHTML = '';
            for(let i = 1; i <= 5; i++) {
                ratingStarsHTML += `<i class="fa-solid fa-star text-[9px] ${i <= ratingCount ? 'text-emerald-400' : 'text-gray-800'}"></i>`;
            }
            return ratingStarsHTML;
        }

        // --- PIPELINE DATA LIFECYCLE ---
        
        // 1. Sync Media Items
        onSnapshot(query(collection(db, "movies"), orderBy("createdAt", "desc")), (snapshot) => {
            const list = document.getElementById("movie-list");
            document.getElementById("movie-count").innerText = snapshot.size;
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const starLayout = buildStarRatingDOM(data.rating || 0);
                const formatBadge = data.type || "Movie";
                const isChecked = data.watched ? "checked" : "";
                
                list.innerHTML += `
                    <div class="bg-gray-950/30 p-3 rounded-xl border border-gray-800/40 flex items-center justify-between hover:border-gray-700/50 transition-colors">
                        <div class="truncate mr-2 max-w-[55%]">
                            <p class="${data.watched ? 'line-through text-gray-500' : 'text-gray-200'} font-medium text-sm truncate">${data.title}</p>
                            <div class="flex items-center space-x-2 mt-1">
                                <span class="text-[9px] px-1.5 py-0.2 bg-gray-900/60 rounded border border-gray-800 text-gray-400 font-mono uppercase tracking-wider">${formatBadge}</span>
                                <span class="text-[10px] text-gray-500">${data.genre || 'General'}</span>
                                <div class="flex space-x-0.5 pl-1">${starLayout}</div>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2 flex-shrink-0">
                            <div class="neo-toggle-container">
                                <input type="checkbox" id="toggle-${doc.id}" ${isChecked} onclick="toggleMovie('${doc.id}', ${data.watched})" class="neo-toggle-input">
                                <label for="toggle-${doc.id}" class="neo-toggle">
                                    <div class="neo-track">
                                        <div class="neo-grid-layer"></div>
                                    </div>
                                    <div class="neo-thumb">
                                        <div class="neo-thumb-ring"></div>
                                        <div class="neo-thumb-core"></div>
                                    </div>
                                    <div class="neo-spectrum-analyzer">
                                        <div class="neo-spectrum-bar"></div>
                                        <div class="neo-spectrum-bar"></div>
                                        <div class="neo-spectrum-bar"></div>
                                    </div>
                                </label>
                            </div>

                            <button onclick="deleteItem('movies', '${doc.id}')" class="bin-button" title="Purge Document">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 39 39" class="bin-top">
                                    <path d="M12 12H27V10H12V12ZM14 8H25V6H14V8Z"></path>
                                </svg>
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 39 39" class="bin-bottom">
                                    <path d="M13 13H26V28H13V13ZM16 16V25H18V16H16ZM21 16V25H23V16H21Z"></path>
                                </svg>
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 39 39" class="garbage">
                                    <path d="M14 14H16V22H14V14ZM18 14H20V22H18V14Z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>`;
            });
        });

        // 2. Sync Knowledge Stack
        onSnapshot(query(collection(db, "study_materials"), orderBy("createdAt", "desc")), (snapshot) => {
            const list = document.getElementById("study-list");
            document.getElementById("study-count").innerText = snapshot.size;
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const linkHTML = data.link ? `<a href="${data.link.startsWith('http') ? data.link : 'https://' + data.link}" target="_blank" class="text-xs text-emerald-400/80 hover:text-emerald-300 hover:underline block mt-0.5 truncate max-w-[180px]"><i class="fa-solid fa-link text-[9px] mr-1"></i> Connected Node</a>` : '';
                list.innerHTML += `
                    <div class="bg-gray-950/30 p-3 rounded-xl border border-gray-800/40 flex items-center justify-between hover:border-gray-700/50 transition-colors">
                        <div class="truncate mr-2">
                            <p class="text-sm font-medium text-gray-200 truncate">${data.topic}</p>
                            ${linkHTML}
                        </div>
                        <button onclick="deleteItem('study_materials', '${doc.id}')" class="bin-button" title="Purge Document">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 39 39" class="bin-top">
                                <path d="M12 12H27V10H12V12ZM14 8H25V6H14V8Z"></path>
                            </svg>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 39 39" class="bin-bottom">
                                <path d="M13 13H26V28H13V13ZM16 16V25H18V16H16ZM21 16V25H23V16H21Z"></path>
                            </svg>
                        </button>
                    </div>`;
            });
        });

        // 3. Sync Ideation Stack
        onSnapshot(query(collection(db, "quotes"), orderBy("createdAt", "desc")), (snapshot) => {
            const list = document.getElementById("quote-list");
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="bg-gradient-to-br from-gray-900/40 to-gray-950/50 p-4 rounded-xl border border-gray-800/40 relative group hover:border-emerald-500/10 transition-colors">
                        <p class="text-sm italic text-gray-300/95 tracking-wide leading-relaxed">"${data.text}"</p>
                        <p class="text-right text-[10px] font-mono text-emerald-500/60 mt-2.5 tracking-wider">— ${data.author || 'Unknown'}</p>
                        <button onclick="deleteItem('quotes', '${doc.id}')" class="absolute top-2 right-2 text-[10px] text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity p-1">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>`;
            });
        });

        // --- WRITE MUTATIONS ---
        window.addMovie = async () => {
            const title = document.getElementById("movie-title");
            const genre = document.getElementById("movie-genre");
            const type = document.getElementById("movie-type");
            
            if(!title.value.trim()) return;
            
            await addDoc(collection(db, "movies"), { 
                title: title.value, 
                genre: genre.value || "General", 
                type: type.value,
                rating: currentSelectedRating,
                watched: false, 
                createdAt: new Date() 
            });
            
            title.value = ""; genre.value = ""; type.value = "Movie"; setRating(0);
        };

        window.addStudyMaterial = async () => {
            const topic = document.getElementById("study-topic");
            const link = document.getElementById("study-link");
            if(!topic.value.trim()) return;
            await addDoc(collection(db, "study_materials"), { topic: topic.value, link: link.value, createdAt: new Date() });
            topic.value = ""; link.value = "";
        };

        window.addQuote = async () => {
            const text = document.getElementById("quote-text");
            const author = document.getElementById("quote-author");
            if(!text.value.trim()) return;
            await addDoc(collection(db, "quotes"), { text: text.value, author: author.value, createdAt: new Date() });
            text.value = ""; author.value = "";
        };

        // --- STATE MODIFIERS ---
        window.toggleMovie = async (id, currentStatus) => {
            await updateDoc(doc(db, "movies", id), { watched: !currentStatus });
        };

        window.deleteItem = async (collectionName, id) => {
            if(confirm("Confirm hard purge from secure cloud registers?")) {
                await deleteDoc(doc(db, collectionName, id));
            }
        };

        // --- DYNAMIC CURSOR SIGNAL DISPATCHER ---
        window.addEventListener('mousemove', (e) => {
            const x = ((e.clientX / window.innerWidth) * 100).toFixed(2);
            const y = ((e.clientY / window.innerHeight) * 100).toFixed(2);
            document.documentElement.style.setProperty('--mouse-x', `${x}%`);
            document.documentElement.style.setProperty('--mouse-y', `${y}%`);
        });
    </script>
</body>
</html>
