<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M I N D S H E L F</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --mouse-x: 50%;
            --mouse-y: 0%;
        }
        body {
            background-color: #0b0f17;
            /* Combines your static header gradient with a dynamic, moving radial cursor glow */
            background-image: 
                radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(16, 185, 129, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 50% 0%, #102a1e 0%, #0b0f17 70%);
            background-attachment: fixed;
        }
        .glass-panel {
            background: rgba(16, 24, 40, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(16, 185, 129, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: border-color 0.4s ease, box-shadow 0.4s ease, transform 0.3s ease;
        }
        /* Subtle interactive hover illumination for the dashboard cards */
        .glass-panel:hover {
            border-color: rgba(16, 185, 129, 0.35);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.1);
            transform: translateY(-2px);
        }
        .neon-glow:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }
        select option {
            background-color: #0b0f17;
            color: #e2e8f0;
        }
        .intro-svg-text {
            font-family: 'Arial Black', Impact, system-ui, sans-serif;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            /* Laser outline drawing effect during initialization */
            stroke: #10b981;
            stroke-width: 0.6px;
            fill: url(#header-gradient);
            fill-opacity: 0;
            stroke-dasharray: 400;
            stroke-dashoffset: 400;
            /* Combines line drawing with a smooth fade-in color fill */
            animation: drawOutline 2s ease-in-out forwards, fillText 0.8s ease-in forwards 1.6s;
        }

        @keyframes drawOutline {
            0% { stroke-dashoffset: 400; stroke-width: 0.6px; }
            70% { stroke-width: 0.4px; }
            100% { stroke-dashoffset: 0; stroke-width: 0px; }
        }

        @keyframes fillText {
            0% { fill-opacity: 0; }
            100% { fill-opacity: 1; }
        }

        /* --- Refactored Cyberpunk Spotify Equalizer Plugin --- */
        .spotify-bar {
            width: 3px;
            height: 18px;
            background-color: #111827;
            animation: bounceEqualizer 1s ease-in-out infinite alternate;
            border-radius: 4px;
            margin: 0 1.5px;
        }
        .spotify-bar:nth-child(1) { animation-delay: 0.1s; background-color: #10b981; }
        .spotify-bar:nth-child(2) { animation-delay: 0.4s; background-color: #34d399; height: 22px; }
        .spotify-bar:nth-child(3) { animation-delay: 0.2s; background-color: #059669; }
        .spotify-bar:nth-child(4) { animation-delay: 0.6s; background-color: #6ee7b7; }

        @keyframes bounceEqualizer {
            0% { transform: scaleY(0.3); }
            100% { transform: scaleY(1.1); }
        }
    </style>
</head>
